trigger:
  batch: true
  branches:
    include:
      - master

pool:
  vmImage: ubuntu-latest

variables:
  imageRepository: fitnessapp
  tag: $(Build.BuildId)

steps:

- task: NodeTool@0
  inputs:
    versionSpec: '20.x'
  displayName: Install Node.js

- script: |
    npm install
    npm run build
  displayName: npm install and build

- task: Docker@2
  displayName: Build and Push Image
  inputs:
    command: buildAndPush
    repository: $(imageRepository)
    dockerfile: '**/Dockerfile'
    containerRegistry: 'fitness-acr'
    tags: |
      $(tag)
      latest