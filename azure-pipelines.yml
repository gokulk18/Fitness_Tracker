trigger:
- master

pool:
  vmImage: ubuntu-latest

variables:
  imageRepository: fitnessapp
  tag: $(Build.BuildId)

steps:

- task: NodeTool@0
  inputs:
    versionSpec: '20.x'

- script: |
    npm install
    npm run build
  displayName: Build Application

- task: Docker@2
  displayName: Build and Push Docker Image
  inputs:
    command: buildAndPush
    repository: $(imageRepository)
    dockerfile: '**/Dockerfile'
    containerRegistry: 'fitness-acr'
    tags: |
      $(tag)
      latest