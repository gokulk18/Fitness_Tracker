trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  imageRepository: fitness-app
  containerRegistry: fitnessacr.azurecr.io
  tag: $(Build.BuildId)

stages:
- stage: Build
  jobs:
  - job: BuildAndPush
    steps:

    - task: Docker@2
      displayName: Build and Push Image
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: '**/Dockerfile'
        containerRegistry: 'fitness-acr'
        tags: |
          $(tag)
          latest